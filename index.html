<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Levogyre — Paul Laffoley, 1974</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #05050e; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { display: block; width: 100vw; height: 100vh; }
  #vr-btn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: transparent; border: 1px solid rgba(200,180,120,0.55);
    color: rgba(200,180,120,0.85); padding: 10px 32px;
    font-family: 'Courier New', monospace; font-size: 12px;
    letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; border-radius: 2px; z-index: 10;
  }
  #vr-btn:hover { background: rgba(200,180,120,0.08); border-color: rgba(200,180,120,0.9); }
  #vr-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  #vr-btn.active { background: rgba(200,180,120,0.15); }
  #title-block {
    position: fixed; top: 22px; left: 24px; z-index: 10; pointer-events: none;
  }
  #title-block h1 {
    font-size: 12px; font-weight: normal; color: rgba(200,180,120,0.65);
    letter-spacing: 0.22em; text-transform: uppercase;
  }
  #title-block p { font-size: 10px; color: rgba(200,180,120,0.3); letter-spacing: 0.12em; margin-top: 4px; }
  #title-block .sub { font-size: 9px; color: rgba(200,180,120,0.18); margin-top: 2px; letter-spacing: 0.08em; }
  #shell-info { position: fixed; top: 22px; right: 24px; z-index: 10; text-align: right; pointer-events: none; }
  .shell-row { font-size: 9px; letter-spacing: 0.08em; line-height: 2.0; opacity: 0.6; }
  #hint {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: rgba(200,180,120,0.18); letter-spacing: 0.18em;
    text-transform: uppercase; white-space: nowrap; pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="title-block">
  <h1>The Levogyre</h1>
  <p>Paul Laffoley &nbsp;·&nbsp; 1974</p>
  <p class="sub">A Levitating Gyroscope Which Attains Consciousness</p>
</div>
<div id="shell-info"></div>
<div id="hint">drag to orbit &nbsp;·&nbsp; scroll to zoom</div>
<button id="vr-btn">Enter VR</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {

const PHI = 1.6180339887;
const PHI_INV = 1 / PHI;
const PHI_MINOR = 1 - PHI_INV; // 0.382

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x05050e, 1);
renderer.xr.enabled = true;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.01, 500);
camera.position.set(0, 1.6, 16);

scene.add(new THREE.AmbientLight(0xffffff, 0.15));
const sun = new THREE.DirectionalLight(0xffd080, 1.0);
sun.position.set(5, 9, 7); scene.add(sun);
const fill = new THREE.DirectionalLight(0x4060cc, 0.4);
fill.position.set(-7, -3, -5); scene.add(fill);
const coreLight = new THREE.PointLight(0xffaa33, 2.5, 25);
coreLight.position.set(0, 0, 0); scene.add(coreLight);
const rimLight = new THREE.PointLight(0x2233ff, 0.6, 60);
rimLight.position.set(0, 0, 0); scene.add(rimLight);

(function () {
  const geo = new THREE.BufferGeometry();
  const pos = [];
  for (let i = 0; i < 2200; i++) {
    const r = 90 + Math.random() * 130;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    pos.push(r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph), r*Math.sin(ph)*Math.sin(th));
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color:0xffffff, size:0.09, transparent:true, opacity:0.35 })));
})();

// Fibonacci shell radii — as specified by Laffoley
const FIB_RAW = [1, 2, 3, 5, 8, 13, 21];
const FIB_SCALE = 9.5 / 21;
const SHELL_RADII = FIB_RAW.map(f => f * FIB_SCALE);
const N = 7;
const ROMAN = ['I','II','III','IV','V','VI','VII'];

// Golden Ratio speed cascade — each shell PHI times faster than the next outer one
// Alternating direction for the levogyric counter-rotation
const BASE_SPEED = 0.065;
const SPEEDS = [];
for (let i = 0; i < N; i++) {
  const mag = BASE_SPEED * Math.pow(PHI, N - 1 - i);
  SPEEDS.push(i % 2 === 0 ? mag : -mag);
}

// Two interlocking 3D logarithmic spiral axes
// The precession axes form two equiangular spirals in 3D space
function logSpiralAxis(i) {
  const t = i / (N - 1);
  const spiral = i % 2 === 0 ? 1 : -1;
  const phi_angle = t * Math.PI * 1.618 * spiral;
  const theta = Math.PI * 0.12 + t * Math.PI * 0.76;
  return new THREE.Vector3(
    Math.sin(theta) * Math.cos(phi_angle),
    Math.cos(theta),
    Math.sin(theta) * Math.sin(phi_angle)
  ).normalize();
}
const AXES = Array.from({length: N}, (_, i) => logSpiralAxis(i));

// Shell colors — warm gold at center (kato-energy / still point)
// progressively cooler / more luminous toward outer shells
// matching the "light becoming consciousness" progression in the painting
const SHELL_COLORS = [
  { glass: 0xffeeaa, em: 0x201400, op: 0.55 },
  { glass: 0xffcc77, em: 0x180c00, op: 0.42 },
  { glass: 0xffaa88, em: 0x180800, op: 0.34 },
  { glass: 0xff88bb, em: 0x180010, op: 0.27 },
  { glass: 0xcc88ff, em: 0x100018, op: 0.21 },
  { glass: 0x88aaff, em: 0x000818, op: 0.16 },
  { glass: 0x88ddff, em: 0x001018, op: 0.12 },
];

const metalMat = new THREE.MeshStandardMaterial({ color:0xd4c070, metalness:0.94, roughness:0.10, emissive:0x1a1200 });
const axleMat  = new THREE.MeshStandardMaterial({ color:0xc8a040, metalness:0.96, roughness:0.08, emissive:0x120e00 });
const pivotMat = new THREE.MeshStandardMaterial({ color:0xffd040, metalness:0.98, roughness:0.04, emissive:0x221800 });

const root = new THREE.Group();
scene.add(root);
const gimbals = [];

for (let i = 0; i < N; i++) {
  const r = SHELL_RADII[i];
  const col = SHELL_COLORS[i];
  const ax = AXES[i];

  // Crystalline glass shell
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(r, 72, 48),
    new THREE.MeshPhysicalMaterial({
      color: col.glass, emissive: col.em,
      metalness: 0.0, roughness: 0.0,
      transmission: 0.85, transparent: true, opacity: col.op,
      side: THREE.DoubleSide,
    })
  );

  // Ferro-fluid medium — glowing viscous liquid trapped between shells
  // A ferric compound in high-viscosity liquid that conducts electricity between shells
  // Visible as a warm luminous fill, brighter near centre (kato-energy source)
  let ferroMesh = null;
  if (i > 0) {
    const innerR = SHELL_RADII[i - 1];
    // Outer boundary of the ferro-fluid zone = just inside current shell
    const ferroR = r * 0.97;
    // Color shifts warm gold near centre, cooler amber/violet toward outside
    const ferroColors = [0xffaa22, 0xff8833, 0xff6644, 0xdd4488, 0x8833cc, 0x3355ff, 0x22aaff];
    const ferroColor = ferroColors[i] || 0xff8833;
    // Outer surface of ferro-fluid (back face fills the gap)
    ferroMesh = new THREE.Mesh(
      new THREE.SphereGeometry(ferroR, 32, 20),
      new THREE.MeshStandardMaterial({
        color: ferroColor,
        emissive: ferroColor,
        emissiveIntensity: 0.6,
        transparent: true,
        opacity: 0.13 + (N - i) * 0.018,
        side: THREE.BackSide,
        roughness: 0.8,
        metalness: 0.1,
      })
    );
    // Inner surface of ferro-fluid (front face) — slightly brighter
    ferroMesh._inner = new THREE.Mesh(
      new THREE.SphereGeometry(innerR * 1.04, 32, 20),
      new THREE.MeshStandardMaterial({
        color: ferroColor,
        emissive: ferroColor,
        emissiveIntensity: 0.9,
        transparent: true,
        opacity: 0.09 + (N - i) * 0.012,
        side: THREE.FrontSide,
        roughness: 0.7,
        metalness: 0.15,
      })
    );
  }

  // Surface wireframe lattice
  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(r + 0.008, 22, 14),
    new THREE.MeshBasicMaterial({ color: col.glass, wireframe: true, transparent: true, opacity: 0.038 + (N-i)*0.006 })
  );

  // Gimbal rings
  const ro = r * 0.055;
  const ring1 = new THREE.Mesh(new THREE.TorusGeometry(r+ro, r*0.018+0.012, 14, 80), metalMat);
  const ring2 = new THREE.Mesh(
    new THREE.TorusGeometry(r+ro*0.7, r*0.012+0.008, 10, 80),
    new THREE.MeshStandardMaterial({ color:0xb09040, metalness:0.90, roughness:0.15, emissive:0x0a0800 })
  );
  ring2.rotation.x = Math.PI / 2;

  // Axle along the logarithmic spiral axis
  const axle = new THREE.Mesh(
    new THREE.CylinderGeometry(r*0.008+0.008, r*0.008+0.008, (r+ro)*2, 10),
    axleMat
  );
  axle.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), ax);

  const shellGroup = new THREE.Group();
  shellGroup.add(sphere, wire, ring1, ring2, axle);
  if (ferroMesh) {
    shellGroup.add(ferroMesh);
    if (ferroMesh._inner) shellGroup.add(ferroMesh._inner);
  }

  // Pivot knobs at axle ends
  [1,-1].forEach(s => {
    const knob = new THREE.Mesh(new THREE.SphereGeometry(r*0.025+0.03, 12, 10), pivotMat);
    knob.position.copy(ax.clone().multiplyScalar(s * (r + ro)));
    shellGroup.add(knob);
  });

  // Betatron / torque-transfer ring — the electron particle accelerator
  // Laffoley: "betatrons or electron particle accelerators built into the Torque Rings"
  const betatron = new THREE.Mesh(
    new THREE.TorusGeometry(r * 0.58, r*0.022+0.014, 8, 48),
    new THREE.MeshStandardMaterial({ color:0x886622, metalness:0.8, roughness:0.3, emissive:0x110800, transparent:true, opacity:0.65 })
  );
  betatron.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), ax);
  shellGroup.add(betatron);

  const gimbalGroup = new THREE.Group();
  gimbalGroup.add(shellGroup);
  root.add(gimbalGroup);
  gimbals.push({ group: gimbalGroup, axis: ax, speed: SPEEDS[i], radius: r });
}

// Central Singularity — the still point / kato-energy / dimensional portal
// This does NOT rotate. It is the unmoved centre of all movement.
const singularity = new THREE.Group();

const singGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.22, 24, 24),
  new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffcc44, emissiveIntensity:3.0, transparent:true, opacity:0.9 })
);
singularity.add(singGlow);

const singCore = new THREE.Mesh(
  new THREE.SphereGeometry(0.09, 16, 16),
  new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffffff, emissiveIntensity:5.0 })
);
singularity.add(singCore);

// Radial light spokes — the "lines of growth" radiating from the singularity
// visible in the painting as straight lines from centre to border
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const len = SHELL_RADII[N-1] * 0.88;
  const spoke = new THREE.Mesh(
    new THREE.CylinderGeometry(0.003, 0.001, len, 4),
    new THREE.MeshBasicMaterial({ color:0xffdd88, transparent:true, opacity:0.04 })
  );
  spoke.rotation.z = Math.PI / 2;
  spoke.rotation.y = angle;
  const dir = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle));
  spoke.position.copy(dir.multiplyScalar(len * 0.5));
  singularity.add(spoke);
}

root.add(singularity);

// Orbit / zoom controls
let isDragging=false, lastX=0, lastY=0, rotX=0.28, rotY=0.4, zoom=16, autoRotate=true;

canvas.addEventListener('mousedown', e => { isDragging=true; autoRotate=false; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup', () => isDragging=false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  rotY += (e.clientX-lastX)*0.006; rotX += (e.clientY-lastY)*0.006;
  lastX=e.clientX; lastY=e.clientY;
});
canvas.addEventListener('wheel', e => { zoom=Math.max(4,Math.min(45,zoom+e.deltaY*0.04)); e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchstart', e => { if(e.touches.length===1){isDragging=true;autoRotate=false;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;} },{passive:true});
canvas.addEventListener('touchend', ()=>isDragging=false,{passive:true});
canvas.addEventListener('touchmove', e => {
  if(!isDragging||e.touches.length!==1)return;
  rotY+=(e.touches[0].clientX-lastX)*0.009; rotX+=(e.touches[0].clientY-lastY)*0.009;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
},{passive:true});

// WebXR
const vrBtn = document.getElementById('vr-btn');
if ('xr' in navigator) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      vrBtn.addEventListener('click', () => {
        if (renderer.xr.isPresenting) {
          renderer.xr.getSession().end();
          vrBtn.textContent='Enter VR'; vrBtn.classList.remove('active');
        } else {
          navigator.xr.requestSession('immersive-vr', { optionalFeatures:['local-floor','bounded-floor','hand-tracking'] })
          .then(session => {
            renderer.xr.setSession(session);
            vrBtn.textContent='Exit VR'; vrBtn.classList.add('active');
            root.position.set(0,0,-18);
            session.addEventListener('end', () => {
              vrBtn.textContent='Enter VR'; vrBtn.classList.remove('active');
              root.position.set(0,0,0);
            });
          });
        }
      });
    } else { vrBtn.disabled=true; vrBtn.textContent='VR not supported'; }
  });
} else { vrBtn.disabled=true; vrBtn.textContent='WebXR unavailable'; }

const infoEl = document.getElementById('shell-info');
const shellHex = SHELL_COLORS.map(c => '#'+c.glass.toString(16).padStart(6,'0'));

// Mass ratio approaches PHI_MINOR (0.382) asymptotically as Laffoley describes
function massRatio(t) { return PHI_MINOR + (1-PHI_MINOR)*Math.exp(-t*0.035); }

const clock = new THREE.Clock();
let elapsed = 0;

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();
  elapsed += dt;

  // Each shell rotates on its own logarithmic-spiral axis
  // at Golden Ratio speed relative to neighbours
  gimbals.forEach(g => g.group.rotateOnAxis(g.axis, g.speed * dt));

  // Singularity — the still point — does not rotate
  // It breathes with a slow pulse: kato-energy (energy efficacious without motion)
  const pulse = 0.88 + 0.12 * Math.sin(elapsed * 2.1);
  singGlow.scale.setScalar(pulse);
  singCore.material.emissiveIntensity = 4.0 + 2.5 * Math.sin(elapsed * 3.3);

  coreLight.intensity = 1.8 + 0.7 * Math.sin(elapsed * 1.9);
  rimLight.intensity = 0.4 + 0.2 * Math.sin(elapsed * 0.7);

  if (autoRotate) { rotY+=0.0012; rotX=Math.sin(elapsed*0.04)*0.22; }
  root.rotation.x = rotX;
  root.rotation.y = rotY;
  camera.position.z = zoom;

  if (!renderer.xr.isPresenting) {
    const mr = massRatio(elapsed);
    infoEl.innerHTML = ROMAN.map((r,i) => {
      const deg = Math.round(((elapsed*SPEEDS[i]*180/Math.PI)%360+360)%360);
      return `<div class="shell-row" style="color:${shellHex[i]}">shell ${r} &nbsp; fib:${FIB_RAW[i]} &nbsp; ${deg}°</div>`;
    }).join('') +
    `<div class="shell-row" style="color:rgba(200,180,120,0.28);margin-top:5px">mass: ${mr.toFixed(4)}</div>` +
    `<div class="shell-row" style="color:rgba(200,180,120,0.16)">→ φ⁻¹ = 0.382...</div>`;
  }

  renderer.render(scene, camera);
});

})();
</script>
</body>
</html>
