<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Levogyre — Paul Laffoley, 1974</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #07070f; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { display: block; width: 100vw; height: 100vh; }

  #ui {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
    align-items: center;
  }

  #vr-btn {
    background: transparent;
    border: 1px solid rgba(200,180,120,0.6);
    color: rgba(200,180,120,0.9);
    padding: 10px 28px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  #vr-btn:hover { background: rgba(200,180,120,0.1); border-color: rgba(200,180,120,0.9); }
  #vr-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #vr-btn.active { background: rgba(200,180,120,0.2); }

  #title-block {
    position: fixed;
    top: 24px;
    left: 28px;
    z-index: 10;
  }
  #title-block h1 {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: normal;
    color: rgba(200,180,120,0.7);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #title-block p {
    font-size: 11px;
    color: rgba(200,180,120,0.35);
    letter-spacing: 0.12em;
    margin-top: 3px;
  }

  #shell-info {
    position: fixed;
    top: 24px;
    right: 28px;
    z-index: 10;
    text-align: right;
  }
  .shell-row {
    font-size: 10px;
    letter-spacing: 0.1em;
    line-height: 1.9;
    opacity: 0.6;
  }

  #hint {
    position: fixed;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: rgba(200,180,120,0.25);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #vr-not-supported {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: rgba(200,180,120,0.5);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-align: center;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="title-block">
  <h1>The Levogyre</h1>
  <p>Paul Laffoley &nbsp;·&nbsp; 1974</p>
</div>

<div id="shell-info"></div>

<div id="hint">drag to orbit &nbsp;·&nbsp; scroll to zoom</div>

<div id="ui">
  <button id="vr-btn">Enter VR</button>
</div>

<div id="vr-not-supported">WebXR not available in this browser</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {

  // ── Renderer ──────────────────────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x07070f, 1);
  renderer.xr.enabled = true;

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Scene / Camera ────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 1.6, 14);

  // ── Lighting ──────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xffffff, 0.2));
  const sun = new THREE.DirectionalLight(0xffd898, 1.2);
  sun.position.set(6, 10, 8);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x6090ff, 0.5);
  fill.position.set(-8, -4, -4);
  scene.add(fill);
  const core_light = new THREE.PointLight(0xffcc66, 1.2, 30);
  core_light.position.set(0, 0, 0);
  scene.add(core_light);

  // Subtle starfield
  (function () {
    const geo = new THREE.BufferGeometry();
    const pos = [];
    for (let i = 0; i < 1800; i++) {
      const r = 80 + Math.random() * 120;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      pos.push(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.4 })));
  })();

  // ── Levogyre Construction ─────────────────────────────────────────────────
  const N = 7;
  const root = new THREE.Group();
  scene.add(root);

  const SHELL_COLORS = [
    { glass: 0x88ccff, em: 0x001830 },
    { glass: 0x99ffee, em: 0x001a14 },
    { glass: 0xffddaa, em: 0x201200 },
    { glass: 0xffaacc, em: 0x200010 },
    { glass: 0xccaaff, em: 0x100020 },
    { glass: 0xaaffaa, em: 0x001800 },
    { glass: 0xfff5e0, em: 0x181410 },
  ];

  // Axes chosen to reflect the painting's offset gimbal geometry
  const AXES = [
    new THREE.Vector3(0, 1, 0),
    new THREE.Vector3(1, 0, 0),
    new THREE.Vector3(0, 0, 1),
    new THREE.Vector3(0.707, 0.707, 0).normalize(),
    new THREE.Vector3(0, 0.707, 0.707).normalize(),
    new THREE.Vector3(0.707, 0, 0.707).normalize(),
    new THREE.Vector3(0.577, 0.577, 0.577).normalize(),
  ];

  const SPEEDS = [0.16, -0.11, 0.20, -0.14, 0.09, -0.22, 0.13]; // rad/s

  const ROMAN = ['I','II','III','IV','V','VI','VII'];

  const gimbals = [];
  const metalMat = new THREE.MeshStandardMaterial({ color: 0xd4c47a, metalness: 0.92, roughness: 0.12, emissive: 0x1a1000 });
  const pivotMat = new THREE.MeshStandardMaterial({ color: 0xffd84a, metalness: 0.98, roughness: 0.05, emissive: 0x221400 });
  const axleMat  = new THREE.MeshStandardMaterial({ color: 0xc8b86a, metalness: 0.95, roughness: 0.1,  emissive: 0x100c00 });

  for (let i = 0; i < N; i++) {
    const r = 1.05 + i * 1.18;
    const col = SHELL_COLORS[i];
    const ax = AXES[i];

    // glass sphere
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(r, 64, 40),
      new THREE.MeshPhysicalMaterial({
        color: col.glass, emissive: col.em,
        metalness: 0.0, roughness: 0.02,
        transmission: 0.78, transparent: true,
        opacity: 0.18 + i * 0.022,
        side: THREE.DoubleSide,
      })
    );

    // inner wireframe lattice
    const wire = new THREE.Mesh(
      new THREE.SphereGeometry(r + 0.01, 20, 14),
      new THREE.MeshBasicMaterial({ color: col.glass, wireframe: true, transparent: true, opacity: 0.06 })
    );

    // outer gimbal ring (primary)
    const ring1 = new THREE.Mesh(
      new THREE.TorusGeometry(r + 0.10, 0.06, 14, 80),
      metalMat
    );

    // secondary gimbal ring (offset 90°)
    const ring2 = new THREE.Mesh(
      new THREE.TorusGeometry(r + 0.10, 0.04, 10, 80),
      new THREE.MeshStandardMaterial({ color: 0xb0a060, metalness: 0.88, roughness: 0.18, emissive: 0x0a0800 })
    );
    ring2.rotation.x = Math.PI / 2;

    // axle rod along the rotation axis
    const axle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.028, 0.028, (r + 0.1) * 2, 10),
      axleMat
    );
    axle.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), ax);

    const shellGroup = new THREE.Group();
    shellGroup.add(sphere, wire, ring1, ring2, axle);
    [1, -1].forEach(s => {
      const knob = new THREE.Mesh(new THREE.SphereGeometry(0.10, 12, 10), pivotMat);
      knob.position.copy(ax.clone().multiplyScalar(s * (r + 0.1)));
      shellGroup.add(knob);
    });

    const gimbalGroup = new THREE.Group();
    gimbalGroup.add(shellGroup);
    root.add(gimbalGroup);

    gimbals.push({ group: gimbalGroup, axis: ax, speed: SPEEDS[i] });
  }

  // Central singularity core
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 20, 20),
    new THREE.MeshStandardMaterial({ color: 0xffeebb, emissive: 0xcc6600, emissiveIntensity: 1.2, metalness: 0.1, roughness: 0.4 })
  );
  root.add(core);

  // ── Mouse / Touch orbit ───────────────────────────────────────────────────
  let isDragging = false, lastX = 0, lastY = 0;
  let rotX = 0.25, rotY = 0.4;
  let zoom = 14;
  let autoRotate = true;

  canvas.addEventListener('mousedown', e => { isDragging = true; autoRotate = false; lastX = e.clientX; lastY = e.clientY; });
  window.addEventListener('mouseup',   () => isDragging = false);
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY += (e.clientX - lastX) * 0.006;
    rotX += (e.clientY - lastY) * 0.006;
    lastX = e.clientX; lastY = e.clientY;
  });
  canvas.addEventListener('wheel', e => { zoom = Math.max(5, Math.min(40, zoom + e.deltaY * 0.04)); e.preventDefault(); }, { passive: false });

  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { isDragging = true; autoRotate = false; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
  }, { passive: true });
  canvas.addEventListener('touchend',   () => isDragging = false, { passive: true });
  canvas.addEventListener('touchmove',  e => {
    if (!isDragging || e.touches.length !== 1) return;
    rotY += (e.touches[0].clientX - lastX) * 0.009;
    rotX += (e.touches[0].clientY - lastY) * 0.009;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }, { passive: true });

  // ── WebXR ─────────────────────────────────────────────────────────────────
  const vrBtn = document.getElementById('vr-btn');

  if ('xr' in navigator) {
    navigator.xr.isSessionSupported('immersive-vr').then(supported => {
      if (supported) {
        vrBtn.addEventListener('click', () => {
          if (renderer.xr.isPresenting) {
            renderer.xr.getSession().end();
            vrBtn.textContent = 'Enter VR';
            vrBtn.classList.remove('active');
          } else {
            navigator.xr.requestSession('immersive-vr', {
              optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
            }).then(session => {
              renderer.xr.setSession(session);
              vrBtn.textContent = 'Exit VR';
              vrBtn.classList.add('active');
              root.position.set(0, 0, -16);
              session.addEventListener('end', () => {
                vrBtn.textContent = 'Enter VR';
                vrBtn.classList.remove('active');
                root.position.set(0, 0, 0);
              });
            });
          }
        });
      } else {
        vrBtn.disabled = true;
        vrBtn.textContent = 'VR not supported';
      }
    });
  } else {
    vrBtn.disabled = true;
    vrBtn.textContent = 'WebXR unavailable';
  }

  // ── Shell info display ────────────────────────────────────────────────────
  const infoEl = document.getElementById('shell-info');
  const shellColors = SHELL_COLORS.map(c => '#' + c.glass.toString(16).padStart(6,'0'));

  // ── Animation loop ────────────────────────────────────────────────────────
  const clock = new THREE.Clock();
  let elapsed = 0;

  renderer.setAnimationLoop(() => {
    const dt = clock.getDelta();
    elapsed += dt;

    // individual shell rotations
    gimbals.forEach(g => g.group.rotateOnAxis(g.axis, g.speed * dt));

    // gentle auto-rotation of whole structure when not dragging
    if (autoRotate) {
      rotY += 0.0015;
      rotX = Math.sin(elapsed * 0.05) * 0.18;
    }

    root.rotation.x = rotX;
    root.rotation.y = rotY;
    camera.position.z = zoom;

    // core pulse
    core_light.intensity = 0.9 + 0.3 * Math.sin(elapsed * 1.8);
    core.material.emissiveIntensity = 0.9 + 0.4 * Math.sin(elapsed * 2.1);

    // update shell info
    if (!renderer.xr.isPresenting) {
      infoEl.innerHTML = ROMAN.map((r, i) => {
        const deg = Math.round(((elapsed * SPEEDS[i] * 180 / Math.PI) % 360 + 360) % 360);
        return `<div class="shell-row" style="color:${shellColors[i]}">shell ${r} &nbsp; ${deg}°</div>`;
      }).join('');
    }

    renderer.render(scene, camera);
  });

})();
</script>
</body>
</html>
